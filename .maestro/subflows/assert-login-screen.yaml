appId: host.exp.exponent
---
- extendedWaitUntil:
    visible:
      id: auth.login.screen
    timeout: 30000
- assertVisible:
    id: auth.login.screen
- assertVisible:
    id: auth.login.email-input
- scrollUntilVisible:
    element:
      id: auth.login.password-input
    direction: DOWN
    visibilityPercentage: 50
- assertVisible:
    id: auth.login.password-input
- scrollUntilVisible:
    element:
      id: auth.login.submit-button
    direction: DOWN
    visibilityPercentage: 50
- assertVisible:
    id: auth.login.submit-button
- scrollUntilVisible:
    element:
      id: auth.login.signup-link
    direction: DOWN
    visibilityPercentage: 50
- assertVisible:
    id: auth.login.signup-link
