appId: host.exp.exponent
env:
  LOGIN_EXPO_URL: ${LOGIN_EXPO_URL || "exp://127.0.0.1:8081/--/login"}
---
- runFlow:
    when:
      visible:
        id: app.tabs.profile
    file: open-profile-tab.yaml
- runFlow:
    when:
      visible:
        id: app.profile.screen
    commands:
      - scrollUntilVisible:
          element:
            id: app.profile.sign-out-button
          direction: DOWN
          visibilityPercentage: 50
      - tapOn:
          id: app.profile.sign-out-button
      - assertVisible:
          id: auth.login.screen
- runFlow:
    when:
      visible:
        id: auth.signup.screen
    commands:
      - openLink: ${LOGIN_EXPO_URL}
      - runFlow: assert-login-screen.yaml
