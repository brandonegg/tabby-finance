appId: host.exp.exponent
env:
  LOGIN_EXPO_URL: ${LOGIN_EXPO_URL || "exp://127.0.0.1:8081/--/login"}
---
- openLink: ${LOGIN_EXPO_URL}
- runFlow:
    when:
      visible: tabby-finance
    commands:
      - tapOn: tabby-finance
- extendedWaitUntil:
    visible: This is the developer menu
    timeout: 15000
    optional: true
    label: Wait for Expo Go onboarding if it appears
- runFlow:
    when:
      visible: This is the developer menu
    commands:
      - tapOn:
          point: 86%,59%
          label: Close Expo Go onboarding sheet
- runFlow: assert-login-screen.yaml
